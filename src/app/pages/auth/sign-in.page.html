<ion-content [fullscreen]="true">
  <div class="min-h-full flex flex-col bg-gradient-to-b from-brand-50 to-white dark:from-slate-900 dark:to-slate-950">
    <div class="px-6 pt-12 pb-6 safe-top">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-12 h-12 rounded-2xl bg-brand-500 flex items-center justify-center text-white text-2xl font-bold shadow-soft">S</div>
        <span class="text-xl font-bold text-slate-900 dark:text-white">SportsMatcher</span>
      </div>
      <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Welcome back</h1>
      <p class="text-base text-slate-500 dark:text-slate-400 mt-2">
        Sign in to find courts and manage your bookings.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="px-6 flex flex-col gap-4">
      <label class="block">
        <span class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Email</span>
        <input
          formControlName="email"
          type="email"
          autocomplete="email"
          inputmode="email"
          placeholder="you@example.com"
          class="mt-1.5 w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500"
        />
        <p
          *ngIf="form.controls.email.touched && form.controls.email.invalid"
          class="text-xs text-red-500 mt-1"
        >Enter a valid email.</p>
      </label>

      <label class="block">
        <span class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Password</span>
        <div class="mt-1.5 relative">
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full h-12 px-4 pr-12 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-400"
          >
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
        <p
          *ngIf="form.controls.password.touched && form.controls.password.invalid"
          class="text-xs text-red-500 mt-1"
        >At least 6 characters.</p>
      </label>

      <button
        type="button"
        (click)="forgotPassword()"
        class="self-end text-sm font-semibold text-brand-600 dark:text-brand-400"
      >Forgot password?</button>

      <button
        type="submit"
        class="h-14 rounded-2xl bg-brand-500 text-white font-semibold text-base shadow-soft active:bg-brand-600 transition mt-2"
      >Sign in</button>

      <button
        *ngIf="biometricAvailable && hasBiometricCreds"
        type="button"
        (click)="signInBiometric()"
        class="h-14 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white font-semibold text-base flex items-center justify-center gap-2"
      >
        <ion-icon name="finger-print-outline" class="text-xl"></ion-icon>
        Sign in with biometric
      </button>
    </form>

    <div class="mt-auto px-6 pb-10 pt-8 safe-bottom text-center">
      <p class="text-sm text-slate-600 dark:text-slate-400">
        New here?
        <a routerLink="/auth/sign-up" class="font-semibold text-brand-600 dark:text-brand-400 ml-1">Create account</a>
      </p>
    </div>
  </div>
</ion-content>
