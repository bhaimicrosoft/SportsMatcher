<ion-header class="ion-no-border">
  <ion-toolbar class="bg-transparent">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/sign-in"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="min-h-full flex flex-col bg-gradient-to-b from-brand-50 to-white dark:from-slate-900 dark:to-slate-950">
    <div class="px-6 pt-6 pb-6">
      <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Create your account</h1>
      <p class="text-base text-slate-500 dark:text-slate-400 mt-2">
        Discover and book courts in seconds.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="px-6 flex flex-col gap-4">
      <label class="block">
        <span class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Your name</span>
        <input
          formControlName="name"
          type="text"
          autocomplete="name"
          placeholder="Jordan Lee"
          class="mt-1.5 w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500"
        />
      </label>

      <label class="block">
        <span class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Email</span>
        <input
          formControlName="email"
          type="email"
          autocomplete="email"
          inputmode="email"
          placeholder="you@example.com"
          class="mt-1.5 w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500"
        />
      </label>

      <label class="block">
        <span class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Password</span>
        <div class="mt-1.5 relative">
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="new-password"
            placeholder="At least 6 characters"
            class="w-full h-12 px-4 pr-12 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-400"
          >
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </label>

      <button
        type="submit"
        class="h-14 rounded-2xl bg-brand-500 text-white font-semibold text-base shadow-soft active:bg-brand-600 transition mt-4"
      >Create account</button>
    </form>

    <div class="mt-auto px-6 pb-10 pt-8 safe-bottom text-center">
      <p class="text-sm text-slate-600 dark:text-slate-400">
        Already have an account?
        <a routerLink="/auth/sign-in" class="font-semibold text-brand-600 dark:text-brand-400 ml-1">Sign in</a>
      </p>
    </div>
  </div>
</ion-content>
