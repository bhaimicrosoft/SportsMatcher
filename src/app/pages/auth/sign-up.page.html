<ion-content [fullscreen]="true" class="auth-page">
  <div class="relative min-h-full overflow-hidden bg-slate-950 text-white">
    <!-- Animated gradient blobs -->
    <div
      class="pointer-events-none absolute -top-40 -right-32 w-[28rem] h-[28rem] rounded-full bg-accent-500/30 blur-3xl animate-blob"
    ></div>
    <div
      class="pointer-events-none absolute top-32 -left-32 w-[26rem] h-[26rem] rounded-full bg-brand-500/40 blur-3xl animate-blob"
      style="animation-delay: 3s"
    ></div>
    <div
      class="pointer-events-none absolute -bottom-32 right-1/3 w-[28rem] h-[28rem] rounded-full bg-brand-700/40 blur-3xl animate-blob"
      style="animation-delay: 6s"
    ></div>

    <!-- Floating sport emojis -->
    <div class="pointer-events-none absolute inset-0">
      <span class="absolute top-16 right-8 text-4xl opacity-40 animate-float">🏀</span>
      <span class="absolute top-32 left-10 text-3xl opacity-50 animate-float-slow" style="animation-delay: 1.4s">🎾</span>
      <span class="absolute top-56 right-14 text-5xl opacity-30 animate-float" style="animation-delay: 2.6s">🏸</span>
      <span class="absolute top-48 left-1/4 text-3xl opacity-40 animate-float-slow" style="animation-delay: 0.8s">🥒</span>
    </div>

    <!-- Subtle grid texture -->
    <div
      class="pointer-events-none absolute inset-0 opacity-[0.04] [background-image:linear-gradient(white_1px,transparent_1px),linear-gradient(90deg,white_1px,transparent_1px)] [background-size:32px_32px]"
    ></div>

    <div class="relative flex flex-col min-h-full safe-top safe-bottom">
      <!-- Back button -->
      <div class="px-3 pt-3">
        <button
          type="button"
          [routerLink]="'/auth/sign-in'"
          class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center text-white"
        >
          <ion-icon name="chevron-back-outline" class="text-xl"></ion-icon>
        </button>
      </div>

      <!-- Hero -->
      <div class="px-6 pt-2 pb-4 text-center animate-slide-up-fade">
        <div
          class="mx-auto w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white text-3xl font-extrabold shadow-2xl shadow-brand-500/40"
        >
          S
        </div>
        <h1 class="mt-5 text-3xl font-extrabold tracking-tight">Join SportsMatcher</h1>
        <p class="mt-2 text-base text-slate-300">Create your account in seconds.</p>
      </div>

      <!-- Glass card with form -->
      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="relative mx-4 mt-2 mb-6 rounded-3xl border border-white/10 bg-white/[0.06] backdrop-blur-xl shadow-2xl shadow-black/40 p-6 animate-slide-up-fade"
        style="animation-delay: 0.15s"
      >
        <div class="flex flex-col gap-4">
          <!-- Name -->
          <div class="relative group">
            <ion-icon
              name="person-outline"
              class="absolute left-4 top-1/2 -translate-y-1/2 text-lg text-slate-400 group-focus-within:text-brand-300 transition-colors"
            ></ion-icon>
            <input
              formControlName="name"
              type="text"
              autocomplete="name"
              placeholder="Your name"
              class="w-full h-13 pl-12 pr-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-brand-400 focus:bg-white/10 transition-all duration-200"
            />
          </div>

          <!-- Email -->
          <div class="relative group">
            <ion-icon
              name="mail-outline"
              class="absolute left-4 top-1/2 -translate-y-1/2 text-lg text-slate-400 group-focus-within:text-brand-300 transition-colors"
            ></ion-icon>
            <input
              formControlName="email"
              type="email"
              autocomplete="email"
              inputmode="email"
              placeholder="Email address"
              class="w-full h-13 pl-12 pr-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-brand-400 focus:bg-white/10 transition-all duration-200"
            />
          </div>

          <!-- Password -->
          <div class="relative group">
            <ion-icon
              name="lock-closed-outline"
              class="absolute left-4 top-1/2 -translate-y-1/2 text-lg text-slate-400 group-focus-within:text-brand-300 transition-colors"
            ></ion-icon>
            <input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="new-password"
              placeholder="Password (6+ characters)"
              class="w-full h-13 pl-12 pr-12 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-brand-400 focus:bg-white/10 transition-all duration-200"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-colors"
            >
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>

          <button
            type="submit"
            class="relative h-14 mt-2 rounded-2xl font-semibold text-base text-white overflow-hidden bg-gradient-to-r from-brand-500 via-brand-400 to-brand-500 shadow-lg shadow-brand-500/40 active:scale-[0.98] transition-transform duration-150 [background-size:200%_100%] animate-shimmer"
          >
            <span class="relative z-10 flex items-center justify-center gap-2">
              Create account
              <ion-icon name="arrow-forward-outline"></ion-icon>
            </span>
          </button>
        </div>

        <p class="mt-4 text-xs text-slate-400 text-center px-2">
          By creating an account you agree to our terms and privacy policy.
        </p>
      </form>

      <!-- Footer -->
      <div
        class="mt-auto px-6 pb-8 text-center animate-slide-up-fade"
        style="animation-delay: 0.3s"
      >
        <p class="text-sm text-slate-400 mt-10">
          Already have an account?
          <a
            routerLink="/auth/sign-in"
            class="font-semibold text-brand-300 hover:text-brand-200 ml-1 transition-colors"
          >Sign in</a>
        </p>
      </div>
    </div>
  </div>
</ion-content>
