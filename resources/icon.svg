<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3bbcff"/>
      <stop offset="100%" stop-color="#0068b3"/>
    </linearGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcf2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#013f70" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded square background. iOS will mask to its own corner radius. -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Decorative blob highlight -->
  <circle cx="780" cy="240" r="180" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="220" cy="820" r="220" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Pickleball / tennis ball -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="240" fill="url(#ball)"/>
    <!-- Curve seam -->
    <path d="M 296 470 Q 512 350 728 470" stroke="#0084e0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 296 554 Q 512 674 728 554" stroke="#0084e0" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Letter S badge -->
  <g transform="translate(640 640)">
    <circle r="120" fill="#ff5d3a"/>
    <text x="0" y="14" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter, system-ui, sans-serif" font-weight="800"
          font-size="160" fill="#ffffff">S</text>
  </g>
</svg>
