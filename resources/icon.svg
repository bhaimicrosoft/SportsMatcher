<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Brand gradient (matches the splash screen's logo card exactly) -->
    <linearGradient id="bg" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0%" stop-color="#6ad6ff"/>
      <stop offset="55%" stop-color="#1ea5ff"/>
      <stop offset="100%" stop-color="#01509f"/>
    </linearGradient>

    <!-- Top specular gloss for depth -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom shading -->
    <linearGradient id="shade" x1="0" y1="0.5" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Drop shadow under the wordmark -->
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#003a76" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- Rounded square. iOS auto-masks with its own continuous corners on top
       of this; Android legacy launchers display this radius directly. -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Soft decorative highlights — adds richness without being literal -->
  <circle cx="800" cy="220" r="220" fill="#ffffff" fill-opacity="0.10"/>
  <circle cx="180" cy="860" r="260" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Top gloss + bottom shade combine to produce a subtle 3D feel -->
  <rect width="1024" height="1024" rx="232" fill="url(#gloss)"/>
  <rect width="1024" height="1024" rx="232" fill="url(#shade)"/>

  <!-- Inner rim light -->
  <rect x="6" y="6" width="1012" height="1012" rx="226"
        fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2.5"/>

  <!-- Hero "S" mark -->
  <g filter="url(#ds)">
    <text x="512" y="544" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-weight="900" font-size="780" fill="#ffffff">S</text>
  </g>
</svg>
