<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3bbcff"/>
      <stop offset="100%" stop-color="#0068b3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="48" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Brand glow blobs -->
  <circle cx="600" cy="700" r="500" fill="#0ea2ff" fill-opacity="0.18" filter="url(#glow)"/>
  <circle cx="2100" cy="2000" r="600" fill="#ff5d3a" fill-opacity="0.14" filter="url(#glow)"/>

  <!-- Centered S logo -->
  <g transform="translate(1366 1280)">
    <rect x="-220" y="-220" width="440" height="440" rx="100" fill="url(#logo)"/>
    <text x="0" y="40" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter, system-ui, sans-serif" font-weight="800"
          font-size="320" fill="#ffffff">S</text>
  </g>

  <text x="1366" y="1720" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-weight="800"
        font-size="120" fill="#ffffff" letter-spacing="-2">SportsMatcher</text>
  <text x="1366" y="1820" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-weight="500"
        font-size="56" fill="#7ad3ff" opacity="0.85">Find your match</text>
</svg>
